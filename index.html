<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bais Naseer Presents | Flash Store v1</title>

<style>
:root { --neon: #00f2ff; --bg: #050505; --card: #111; }
body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

/* --- LOGIN SYSTEM --- */
#login-screen {
    position: fixed; width: 100%; height: 100%; background: black;
    z-index: 2000; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
}
.login-box {
    width: 100%; max-width: 350px; background: #111; padding: 30px;
    border-radius: 20px; border: 1px solid var(--neon); text-align: center;
    box-shadow: 0 0 20px var(--neon);
}
input {
    width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px;
    border: 1px solid #333; background: #000; color: white; outline: none;
}
input:focus { border-color: var(--neon); }
.btn-wa { background: #25d366; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
.btn-verify { background: var(--neon); color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

/* --- SPLASH --- */
#splash {
    position: fixed; width: 100%; height: 100%; background: black;
    display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1500;
}
.bolt {
    width: 60px; height: 90px; background: var(--neon);
    clip-path: polygon(45% 0%, 100% 0%, 70% 45%, 100% 45%, 30% 100%, 50% 55%, 10% 55%);
    animation: glow 1s infinite alternate;
}
@keyframes glow { from { filter: drop-shadow(0 0 5px var(--neon)); } to { filter: drop-shadow(0 0 20px var(--neon)); } }

/* --- MAIN UI --- */
header { padding: 20px; background: #111; border-bottom: 2px solid var(--neon); text-align: center; position: relative; }
.rgb-text {
    background: linear-gradient(to right, #ff0000, #00ff00, #00f2ff, #ff00ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-size: 300%; animation: rgb 5s infinite linear;
}
@keyframes rgb { 0% { background-position: 0%; } 100% { background-position: 300%; } }

.apps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
.card {
    background: var(--card); border-radius: 15px; padding: 25px 10px;
    border: 1px solid #222; text-align: center; transition: 0.3s;
}
.card:active { transform: scale(0.95); border-color: var(--neon); }

/* --- DETAIL PAGE --- */
#detail-page {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: black; display: none; z-index: 900; padding: 30px; box-sizing: border-box;
}
.bar-bg { height: 8px; background: #222; border-radius: 10px; margin: 25px 0; overflow: hidden; }
.bar-fill { height: 100%; width: 0%; background: var(--neon); }
.install-btn { width: 100%; padding: 18px; border: none; background: var(--neon); color: black; font-weight: 900; border-radius: 10px; }

/* Settings */
#settings-modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); z-index: 1001;
}
.s-box { background: #111; width: 80%; margin: 30% auto; padding: 25px; border-radius: 15px; border: 1px solid var(--neon); }
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 class="rgb-text">VERIFICATION</h2>
        <p style="font-size: 12px; color: #888;">Step 1: Get random code via WhatsApp<br>Step 2: Admin will give you real key</p>
        <input type="text" id="u-name" placeholder="Enter Your Name">
        <button class="btn-wa" onclick="getOTP()">GET CODE VIA WHATSAPP</button>
        <hr border="0" style="height:1px; background:#222; margin: 15px 0;">
        <input type="text" id="u-otp" placeholder="Enter Verification Key">
        <button class="btn-verify" onclick="verifyOTP()">VERIFY & ENTER</button>
    </div>
</div>

<div id="splash" style="display:none">
    <div class="bolt"></div>
    <h2 class="rgb-text" style="margin-top:20px;">BAIS NASEER</h2>
    <p style="font-size: 10px; letter-spacing: 2px;">FLASH STORE V1</p>
</div>

<div id="main-ui" style="display:none">
    <header>
        <div style="font-size: 12px; color: var(--neon); font-weight: bold;">BAIS NASEER PRESENTS</div>
        <div class="rgb-text" style="font-size: 24px; font-weight: 900;">FLASH STORE V1</div>
        <div onclick="toggleSettings()" style="position:absolute; right:20px; top:25px; cursor:pointer;">⚙️</div>
    </header>

    <div id="ai-msg" style="display:none; padding:15px; background:#111; border-left:4px solid var(--neon); margin:15px; font-size:13px;">
        <strong>FLASH AI:</strong> Hello! Hope you enjoy the mods.
    </div>

    <div class="apps-grid" id="apps-box"></div>
</div>

<div id="detail-page">
    <button onclick="hideDetails()" style="background:none; border:none; color:var(--neon); font-weight:bold; cursor:pointer;">← BACK</button>
    <div style="text-align: center; margin-top: 50px;">
        <div id="dIcon" style="font-size: 50px;"></div>
        <h1 id="dTitle" class="rgb-text"></h1>
        <p id="dDev" style="color:var(--neon); font-size: 12px;"></p>
        <p id="dDesc" style="color:#aaa; font-size: 14px;"></p>
        <div class="bar-bg"><div class="bar-fill" id="fBar"></div></div>
        <button class="install-btn" id="i-btn" onclick="startInstall()">INSTALL NOW</button>
    </div>
</div>

<div id="settings-modal" onclick="toggleSettings()">
    <div class="s-box" onclick="event.stopPropagation()">
        <h3 style="color:var(--neon)">Settings</h3>
        <div style="display:flex; justify-content:space-between; margin: 20px 0;">
            <span>Flash AI Assistant</span>
            <input type="checkbox" id="ai-chk" onchange="toggleAI()" style="width:20px;">
        </div>
        <button onclick="logout()" style="color:red; background:none; border:none; font-weight:bold; cursor:pointer;">LOGOUT DEVICE</button>
    </div>
</div>

<script>
const myWA = "923234787263";
const REAL_KEY = "FLASH2026"; // Aapka real hidden code jo aap user ko denge

const apps = [
    { name: "Cricket PLP Files", dev: "Baltistani Gamer", icon: "📄", link: "https://play.google.com/store/apps/details?id=com.uswatechnologies.cricketplpstore", desc: "Premium cricket design assets." },
    { name: "Real Cricket", dev: "Nautilus", icon: "🏏", link: "https://play.google.com/store/apps/details?id=com.nautilus.realcricket", desc: "Best cricket simulation." },
    { name: "WCC 3 MOD", dev: "Nextwave", icon: "🏟️", link: "https://play.google.com/store/apps/details?id=com.nextwave.wcc3", desc: "Unlocked features for WCC3." },
    { name: "PUBG Mobile", dev: "Tencent", icon: "🔫", link: "https://play.google.com/store/apps/details?id=com.tencent.ig", desc: "Battle royale experience." }
];

let selected = null;

window.onload = function() {
    if(localStorage.getItem("flash_verified")) {
        document.getElementById('login-screen').style.display = 'none';
        launchApp();
    }
}

function getOTP() {
    const name = document.getElementById('u-name').value;
    if(!name) return alert("Please enter your name!");
    
    // Generating Random Encrypted-looking code
    const randomCode = "BAIS-" + Math.floor(Math.random() * 999999) + "-DEV";
    const msg = `Assalam o Alaikum Bais! I am ${name}. My Request Code is: ${randomCode}. Please give me the Real Verification Key for Flash Store.`;
    
    window.open(`https://wa.me/${myWA}?text=${encodeURIComponent(msg)}`, '_blank');
}

function verifyOTP() {
    const otp = document.getElementById('u-otp').value;
    if(otp === REAL_KEY) {
        localStorage.setItem("flash_verified", "true");
        document.getElementById('login-screen').style.display = 'none';
        launchApp();
    } else {
        alert("Invalid Key! Please contact Bais on WhatsApp.");
    }
}

function launchApp() {
    document.getElementById('splash').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        loadApps();
    }, 2500);
}

function loadApps() {
    const box = document.getElementById('apps-box');
    box.innerHTML = "";
    apps.forEach(app => {
        box.innerHTML += `
            <div class="card" onclick='showApp(${JSON.stringify(app)})'>
                <div style="font-size: 30px;">${app.icon}</div>
                <div class="card-name" style="margin-top:10px; font-weight:bold;">${app.name}</div>
                <div style="font-size: 9px; color: var(--neon);">${app.dev}</div>
            </div>`;
    });
}

function showApp(app) {
    selected = app;
    document.getElementById('detail-page').style.display = 'block';
    document.getElementById('dTitle').innerText = app.name;
    document.getElementById('dIcon').innerText = app.icon;
    document.getElementById('dDev').innerText = "Developer: " + app.dev;
    document.getElementById('dDesc').innerText = app.desc;
    document.getElementById('fBar').style.width = "0%";
}

function hideDetails() { document.getElementById('detail-page').style.display = 'none'; }

function startInstall() {
    let p = 0;
    let btn = document.getElementById('i-btn');
    btn.disabled = true;
    btn.innerText = "DOWNLOADING...";
    let t = setInterval(() => {
        p += 5;
        document.getElementById('fBar').style.width = p + "%";
        if(p >= 100) {
            clearInterval(t);
            btn.innerText = "OPEN STORE";
            window.open(selected.link, "_blank");
            setTimeout(() => { btn.disabled = false; btn.innerText = "INSTALL NOW"; }, 2000);
        }
    }, 100);
}

function toggleSettings() {
    const m = document.getElementById('settings-modal');
    m.style.display = (m.style.display == 'block') ? 'none' : 'block';
}

function toggleAI() {
    document.getElementById('ai-msg').style.display = document.getElementById('ai-chk').checked ? 'block' : 'none';
}

function logout() {
    localStorage.removeItem("flash_verified");
    location.reload();
}
</script>

</body>
</html>
