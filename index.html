<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bais Naseer Presents | Flash Store v1</title>

<style>
:root { --neon: #00f2ff; --bg: #050505; --card: #111; --wa: #25d366; }
body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

/* --- LOGIN / OTP SYSTEM --- */
#login-screen {
    position: fixed; width: 100%; height: 100%; background: black;
    z-index: 2000; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
}
.login-box {
    width: 100%; max-width: 350px; background: #111; padding: 30px;
    border-radius: 20px; border: 1px solid var(--neon); text-align: center;
    box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
}
input {
    width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px;
    border: 1px solid #333; background: #000; color: white; outline: none;
}
input:focus { border-color: var(--neon); }
.btn-wa { background: var(--wa); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
.btn-verify { background: var(--neon); color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

/* --- SPLASH SCREEN --- */
#splash {
    position: fixed; width: 100%; height: 100%; background: black;
    display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1500;
}
.bolt {
    width: 60px; height: 90px; background: var(--neon);
    clip-path: polygon(45% 0%, 100% 0%, 70% 45%, 100% 45%, 30% 100%, 50% 55%, 10% 55%);
    animation: glow 1s infinite alternate;
}
@keyframes glow { from { filter: drop-shadow(0 0 5px var(--neon)); } to { filter: drop-shadow(0 0 20px var(--neon)); } }

/* --- MAIN UI --- */
header { padding: 20px; background: #111; border-bottom: 2px solid var(--neon); text-align: center; position: relative; }
.brand-sub { font-size: 11px; color: var(--neon); font-weight: bold; letter-spacing: 2px; }
.rgb-text {
    background: linear-gradient(to right, #ff0000, #00ff00, #00f2ff, #ff00ff, #ff0000);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-size: 300%; animation: rgb 5s infinite linear;
}
@keyframes rgb { 0% { background-position: 0%; } 100% { background-position: 300%; } }

/* WA CHANNEL BUTTON */
.wa-channel-btn {
    display: inline-block; margin-top: 10px; padding: 6px 15px;
    background: rgba(37, 211, 102, 0.15); border: 1px solid var(--wa);
    color: var(--wa); border-radius: 20px; font-size: 11px; text-decoration: none;
    font-weight: bold; transition: 0.3s;
}
.wa-channel-btn:hover { background: var(--wa); color: white; }

/* APPS LIST */
.apps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
.card {
    background: var(--card); border-radius: 15px; padding: 25px 10px;
    border: 1px solid #222; text-align: center; transition: 0.2s; cursor: pointer;
}
.card:active { transform: scale(0.95); border-color: var(--neon); }

/* --- DETAIL PAGE --- */
#detail-page {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: black; display: none; z-index: 900; padding: 30px; box-sizing: border-box;
}
.bar-bg { height: 8px; background: #222; border-radius: 10px; margin: 25px 0; overflow: hidden; }
.bar-fill { height: 100%; width: 0%; background: var(--neon); }
.install-btn { width: 100%; padding: 18px; border: none; background: var(--neon); color: black; font-weight: 900; border-radius: 10px; }

/* Settings */
#settings-modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 1001; backdrop-filter: blur(5px);
}
.s-box { background: #111; width: 80%; max-width: 320px; margin: 35% auto; padding: 25px; border-radius: 20px; border: 1px solid var(--neon); }
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 class="rgb-text">FLASH STORE</h2>
        <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Contact Bais for Verification Key</p>
        <input type="text" id="u-name" placeholder="Your Name">
        <button class="btn-wa" onclick="getOTP()">GET CODE VIA WHATSAPP</button>
        <div style="margin: 15px 0; font-size: 10px; color: #444;">OR ENTER KEY BELOW</div>
        <input type="text" id="u-otp" placeholder="Enter Key Here">
        <button class="btn-verify" onclick="verifyOTP()">VERIFY & LOGIN</button>
    </div>
</div>

<div id="splash" style="display:none">
    <div class="bolt"></div>
    <h2 class="rgb-text" style="margin-top:20px;">BAIS NASEER</h2>
    <p style="font-size: 10px; letter-spacing: 3px; color: #555;">FLASH STORE V1</p>
</div>

<div id="main-ui" style="display:none">
    <header>
        <div class="brand-sub">BAIS NASEER PRESENTS</div>
        <div class="rgb-text" style="font-size: 26px; font-weight: 900;">FLASH STORE V1</div>
        <a href="https://whatsapp.com/channel/0029VaC333" target="_blank" class="wa-channel-btn">JOIN WHATSAPP CHANNEL</a>
        
        <div onclick="toggleSettings()" style="position:absolute; right:20px; top:25px; cursor:pointer; font-size: 20px;">⚙️</div>
    </header>

    <div id="ai-msg" style="display:none; padding:15px; background:rgba(0, 242, 255, 0.05); border-left:4px solid var(--neon); margin:15px; font-size:13px; border-radius: 0 10px 10px 0;">
        <strong>FLASH AI:</strong> Hello <span id="user-display"></span>! Welcome to Bais Gaming Edition.
    </div>

    <div class="apps-grid" id="apps-box"></div>
</div>

<div id="detail-page">
    <button onclick="hideDetails()" style="background:none; border:none; color:var(--neon); font-weight:bold; cursor:pointer; padding: 10px 0;">← BACK</button>
    <div style="text-align: center; margin-top: 40px;">
        <div id="dIcon" style="font-size: 60px;"></div>
        <h1 id="dTitle" class="rgb-text" style="margin: 15px 0;"></h1>
        <p id="dDev" style="color:var(--neon); font-size: 12px; font-weight: bold;"></p>
        <p id="dDesc" style="color:#777; font-size: 14px; line-height: 1.6;"></p>
        <div class="bar-bg"><div class="bar-fill" id="fBar"></div></div>
        <button class="install-btn" id="i-btn" onclick="startInstall()">INSTALL NOW</button>
    </div>
</div>

<div id="settings-modal" onclick="toggleSettings()">
    <div class="s-box" onclick="event.stopPropagation()">
        <h3 style="color:var(--neon); margin-top: 0;">Settings</h3>
        <div style="display:flex; justify-content:space-between; align-items: center; margin: 25px 0;">
            <span style="font-size: 14px;">Enable Flash AI</span>
            <input type="checkbox" id="ai-chk" onchange="toggleAI()" style="width:18px; height:18px;">
        </div>
        <button onclick="logout()" style="color:red; background:none; border:1px solid red; padding: 10px; width: 100%; border-radius: 10px; font-weight:bold; cursor:pointer;">LOGOUT DEVICE</button>
        <p style="text-align: center; font-size: 10px; color: #444; margin-top: 20px;">Flash Store v1.2.0 | Bais Dev</p>
    </div>
</div>

<script>
const myWA = "923234787263";
const REAL_KEY = "FLASH2026"; // Aapka real secret key

const apps = [
    { name: "Cricket PLP Files", dev: "Baltistani Gamer", icon: "📄", link: "https://play.google.com/store/apps/details?id=com.uswatechnologies.cricketplpstore", desc: "Download high-quality cricket PLP files for your designs." },
    { name: "Real Cricket", dev: "Nautilus Mobile", icon: "🏏", link: "https://play.google.com/store/apps/details?id=com.nautilus.realcricket", desc: "Most realistic cricket simulation on mobile." },
    { name: "WCC 3 MOD", dev: "Nextwave", icon: "🏟️", link: "https://play.google.com/store/apps/details?id=com.nextwave.wcc3", desc: "Unlocked features and high-end graphics." },
    { name: "PUBG Mobile", dev: "Level Infinite", icon: "🔫", link: "https://play.google.com/store/apps/details?id=com.tencent.ig", desc: "Legendary battle royale action." }
];

let selectedApp = null;

window.onload = function() {
    if(localStorage.getItem("flash_access")) {
        document.getElementById('login-screen').style.display = 'none';
        launchStore();
    }
}

function getOTP() {
    const name = document.getElementById('u-name').value;
    if(!name) return alert("Please enter your name first!");
    
    const randomID = "BAIS-" + Math.floor(Math.random() * 899999 + 100000) + "-DEV";
    const waMsg = `Assalam o Alaikum Bais! I am ${name}. My Verification Request Code is: ${randomID}. Please provide the real access key.`;
    
    window.open(`https://wa.me/${myWA}?text=${encodeURIComponent(waMsg)}`, '_blank');
}

function verifyOTP() {
    const key = document.getElementById('u-otp').value;
    const name = document.getElementById('u-name').value;
    if(key === REAL_KEY) {
        localStorage.setItem("flash_access", "true");
        localStorage.setItem("flash_user", name || "User");
        document.getElementById('login-screen').style.display = 'none';
        launchStore();
    } else {
        alert("Invalid Key! Get the real key from Bais Naseer on WhatsApp.");
    }
}

function launchStore() {
    document.getElementById('splash').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('user-display').innerText = localStorage.getItem("flash_user");
        renderApps();
    }, 2500);
}

function renderApps() {
    const box = document.getElementById('apps-box');
    box.innerHTML = "";
    apps.forEach(app => {
        box.innerHTML += `
            <div class="card" onclick='showDetails(${JSON.stringify(app)})'>
                <div style="font-size: 35px;">${app.icon}</div>
                <div style="margin-top:12px; font-weight:bold; font-size: 14px;">${app.name}</div>
                <div style="font-size: 9px; color: var(--neon); letter-spacing:1px;">${app.dev}</div>
            </div>`;
    });
}

function showDetails(app) {
    selectedApp = app;
    document.getElementById('detail-page').style.display = 'block';
    document.getElementById('dTitle').innerText = app.name;
    document.getElementById('dIcon').innerText = app.icon;
    document.getElementById('dDev').innerText = "Developed By " + app.dev;
    document.getElementById('dDesc').innerText = app.desc;
    document.getElementById('fBar').style.width = "0%";
}

function hideDetails() { document.getElementById('detail-page').style.display = 'none'; }

function startInstall() {
    let p = 0;
    let btn = document.getElementById('i-btn');
    btn.disabled = true;
    btn.innerText = "PREPARING FILES...";
    let timer = setInterval(() => {
        p += 5;
        document.getElementById('fBar').style.width = p + "%";
        if(p >= 100) {
            clearInterval(timer);
            btn.innerText = "OPEN STORE";
            window.open(selectedApp.link, "_blank");
            setTimeout(() => { btn.disabled = false; btn.innerText = "INSTALL NOW"; }, 2000);
        }
    }, 120);
}

function toggleSettings() {
    const modal = document.getElementById('settings-modal');
    modal.style.display = (modal.style.display == 'block') ? 'none' : 'block';
}

function toggleAI() {
    document.getElementById('ai-msg').style.display = document.getElementById('ai-chk').checked ? 'block' : 'none';
}

function logout() {
    localStorage.removeItem("flash_access");
    localStorage.removeItem("flash_user");
    location.reload();
}
</script>

</body>
</html>
