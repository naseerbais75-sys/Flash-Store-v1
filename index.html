<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Store</title>

<style>
body{margin:0;font-family:Segoe UI;background:#030303;color:white}

/* Splash */
#splash{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
background:black;color:cyan;font-size:30px;
z-index:100;animation:pulse 1s infinite alternate;
}
@keyframes pulse{from{opacity:.5}to{opacity:1}}

/* Loader */
#loading{
position:fixed;width:100%;height:100%;
background:#000000cc;display:none;
justify-content:center;align-items:center;
z-index:99;
}
.loader{
width:50px;height:50px;
border:5px solid #222;border-top:5px solid cyan;
border-radius:50%;animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* Header */
header{
display:flex;justify-content:space-between;
padding:10px;background:#111;
box-shadow:0 0 10px cyan;
}

/* Search */
.search{
padding:10px;
}
.search input{
width:100%;padding:10px;border-radius:10px;
border:none;background:#111;color:white;
}

/* Tabs */
.tabs{display:flex;justify-content:space-around;margin:10px}
.tabs button{padding:10px;border:none;background:#111;color:white;border-radius:10px}
.active{background:cyan;color:black}

/* Apps */
.apps{
display:grid;grid-template-columns:repeat(2,1fr);
gap:10px;padding:10px;
}
.card{
background:#111;border-radius:15px;
overflow:hidden;box-shadow:0 0 15px cyan;
}
.card img{width:100%;height:120px;object-fit:cover}
.overlay{padding:10px}

/* Detail Page */
#detail{
display:none;padding:10px;
}
#detail img{width:100%;border-radius:15px}
.progress{
height:10px;background:#222;border-radius:10px;margin-top:10px;
}
.bar{
height:100%;width:0;background:cyan;border-radius:10px;
}

/* Buttons */
button{
padding:10px;border:none;border-radius:10px;
background:cyan;color:black;margin-top:10px;
}
</style>
</head>

<body>

<div id="splash">⚡ Flash Store</div>

<div id="loading"><div class="loader"></div></div>

<!-- MAIN -->
<div id="app" style="display:none">

<header>
<span id="coins">💰 0</span>
<h3>Flash Store</h3>
</header>

<div class="search">
<input type="text" placeholder="Search apps..." onkeyup="searchApps(this.value)">
</div>

<div class="tabs">
<button id="allBtn" onclick="filterApps('all')">All</button>
<button id="cricketBtn" onclick="filterApps('cricket')">Cricket</button>
<button id="otherBtn" onclick="filterApps('other')">Other</button>
</div>

<div class="apps" id="apps"></div>

</div>

<!-- DETAIL PAGE -->
<div id="detail">
<button onclick="back()">⬅ Back</button>
<img id="dImg">
<h2 id="dName"></h2>
<p id="dDesc"></p>

<button onclick="startDownload()">Install</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>
</div>

<script>

let coins=0;
let currentApp=null;

// splash
setTimeout(()=>{
splash.style.display="none";
app.style.display="block";
},2000);

// data
let appsData=[
{
name:"PUBG Mobile",
category:"other",
img:"https://images.unsplash.com/photo-1605902711622-cfb43c4437d1",
desc:"Battle Royale game with HD graphics",
link:"https://play.google.com/store/apps/details?id=com.tencent.ig"
},
{
name:"Free Fire",
category:"other",
img:"https://images.unsplash.com/photo-1611605698335-8b1569810432",
desc:"Fast-paced survival shooter",
link:"https://play.google.com/store/apps/details?id=com.dts.freefireth"
},
{
name:"Real Cricket 24",
category:"cricket",
img:"https://images.unsplash.com/photo-1593349480506-8433634cdcbe",
desc:"Realistic cricket experience",
link:"https://play.google.com/store/apps/details?id=com.nautilus.RealCricket3D"
},
{
name:"WCC3",
category:"cricket",
img:"https://images.unsplash.com/photo-1622279457486-28f8b1d0c8b2",
desc:"World Cricket Championship 3",
link:"https://play.google.com/store/apps/details?id=com.nextwave.wcc3"
}
];

// show apps
function displayApps(list){
apps.innerHTML="";
list.forEach(app=>{
apps.innerHTML+=`
<div class="card" onclick='openDetail(${JSON.stringify(app)})'>
<img src="${app.img}">
<div class="overlay">${app.name}</div>
</div>`;
});
}

// filter
function filterApps(type){
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
if(type=="all") allBtn.classList.add("active");
if(type=="cricket") cricketBtn.classList.add("active");
if(type=="other") otherBtn.classList.add("active");

displayApps(type=="all"?appsData:appsData.filter(a=>a.category==type));
}

// search
function searchApps(val){
let filtered=appsData.filter(a=>a.name.toLowerCase().includes(val.toLowerCase()));
displayApps(filtered);
}

// detail
function openDetail(app){
currentApp=app;
appDiv=document.getElementById("app");
detail.style.display="block";
appDiv.style.display="none";

dImg.src=app.img;
dName.innerText=app.name;
dDesc.innerText=app.desc;
}

// back
function back(){
detail.style.display="none";
app.style.display="block";
}

// download animation
function startDownload(){
let bar=document.getElementById("bar");
let width=0;

let interval=setInterval(()=>{
width+=5;
bar.style.width=width+"%";

if(width>=100){
clearInterval(interval);
coins+=20;
document.getElementById("coins").innerText="💰 "+coins;
window.open(currentApp.link,"_blank");
}
},100);
}

// init
filterApps("all");

</script>

</body>
</html>
